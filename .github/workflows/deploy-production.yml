name: Deploy to Production (Phase 2 - Blob Config)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  SMOKE_TEST_KEYWORD: "Rose Cottage Croft" 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build and Publish
      run: |
        dotnet restore src/NopCommerce.sln
        dotnet build src/NopCommerce.sln -c Release --no-restore
        dotnet publish src/Presentation/Nop.Web/Nop.Web.csproj -c Release -o ./app_publish --no-build

    - name: Version Inject & Clean
      run: |
        # 1. Prepare Version Data
        export SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        export VERSION_STR="Build #${{ github.run_number }} ($SHORT_SHA) - $(date +'%Y-%m-%d')"
        export FOOTER_PATH="./app_publish/Views/Shared/Components/Footer/Default.cshtml"
        
        if [ -f "$FOOTER_PATH" ]; then
          echo "Injecting version: $VERSION_STR"
          
          # This one-liner reads the file, replaces the tag, and lstrips to fix the @model error
          python3 -c "import os; p=os.environ['FOOTER_PATH']; v=os.environ['VERSION_STR']; data=open(p, 'r', encoding='utf-8-sig').read(); open(p, 'w', encoding='utf-8').write(data.replace('VERSION_STRING', v).lstrip())"
          
          echo "Python injection and @model safety check complete."
        fi

        # 2. Storage Cleanup
        rm -rf ./app_publish/wwwroot/images/thumbs/*
        rm -rf ./app_publish/App_Data/Logs/*
        
        # 3. Bake appsettings.json
        cat > ./app_publish/appsettings.json << 'EOF'
        {
          "ConnectionStrings": {
            "ConnectionString": "Server=tcp:${{ secrets.PROD_SQL_SERVER }}.database.windows.net,1433;Initial Catalog=${{ secrets.PROD_SQL_DATABASE }};Persist Security Info=False;User ID=${{ secrets.SQL_ADMIN_USERNAME }};Password=${{ secrets.SQL_ADMIN_PASSWORD }};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;",
            "DataProvider": "sqlserver"
          },
          "AzureBlobConfig": {
            "ConnectionString": "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}",
            "ContainerName": "nop-config",
            "EndPoint": "${{ secrets.AZURE_STORAGE_BLOB_ENDPOINT }}",
            "AppendContainerName": false
          }
        }
        EOF

        # 4. Bake the Plugin State (This tells nopCommerce which plugins are "Installed")
        cat > ./app_publish/App_Data/plugins.json << 'EOF'
        {
          "InstalledPluginNames": [
            "Obsolete field, using only for compatibility"
          ],
          "InstalledPlugins": [
            {
              "SystemName": "Payments.PayPalCommerce",
              "Version": "5.00.6"
            },
            {
              "SystemName": "Payments.Square",
              "Version": "5.00.1"
            },
            {
              "SystemName": "Pickup.PickupInStore",
              "Version": "5.00.6"
            },
            {
              "SystemName": "ExternalAuth.Facebook",
              "Version": "5.00.3"
            },
            {
              "SystemName": "Shipping.FixedByWeightByTotal",
              "Version": "5.00.7"
            },
            {
              "SystemName": "Misc.Zettle",
              "Version": "5.00.4"
            },
            {
              "SystemName": "Tax.FixedOrByCountryStateZip",
              "Version": "5.00.4"
            },
            {
              "SystemName": "Widgets.GoogleAnalytics",
              "Version": "5.00.3"
            },
            {
              "SystemName": "PromotionFeed.GoogleShopping",
              "Version": "1.92"
            },
            {
              "SystemName": "Misc.AzureBlob",
              "Version": "5.00.2"
            },
            {
              "SystemName": "DiscountRequirement.MultiBuy",
              "Version": "5.00.1"
            },
            {
              "SystemName": "Search.AzureAI",
              "Version": "1.0.1"
            },
            {
              "SystemName": "Widgets.MarketLocator",
              "Version": "1.0.0"
            },
            {
              "SystemName": "Shipping.MarketPickup",
              "Version": "1.0.0"
            }
          ],
          "PluginNamesToUninstall": [],
          "PluginNamesToDelete": [],
          "PluginNamesToInstall": []
        }
        EOF

        cd app_publish && zip -r ../nop-app.zip .

    - name: Upload Zip
      uses: actions/upload-artifact@v4
      with:
        name: nopcommerce-app
        path: nop-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: Production
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: nopcommerce-app

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Prepare Infrastructure
      run: |
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku S1
        az webapp deployment slot create --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --configuration-source ${{ secrets.AZURE_WEBAPP_NAME }}
        
        # Verbose errors for staging only
        az webapp config appsettings set --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --settings ASPNETCORE_ENVIRONMENT="Development"

    - name: Deploy to Staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        package: 'nop-app.zip'

    - name: Warm Up & Smoke Test
      run: |
        echo "Waiting 90 seconds for initialization..."
        sleep 90
        URL="https://${{ secrets.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
        RESPONSE=$(curl -sL --retry 5 --retry-delay 30 "$URL")
        if echo "$RESPONSE" | grep -qi "${{ env.SMOKE_TEST_KEYWORD }}"; then
          echo "SUCCESS: Store loaded."
        else
          echo "ERROR: Keyword not found. Response snippet below:"
          echo "$RESPONSE" | head -c 2000
          exit 1
        fi

    - name: Swap and Cleanup
      if: always()
      run: |
        if [[ "${{ job.status }}" == "success" ]]; then
          az webapp deployment slot swap --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --target-slot production
        fi
        az webapp deployment slot delete --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging || true
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku D1 || true