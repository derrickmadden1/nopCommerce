name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  FORCE_KEEP_PLUGINS: '["Widgets.MarketLocator", "Shipping.MarketPickup"]'
  SMOKE_TEST_KEYWORD: "Rose Cottage Croft" 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build and Publish
      run: |
        dotnet restore src/NopCommerce.sln
        dotnet build src/NopCommerce.sln -c Release --no-restore
        dotnet publish src/Presentation/Nop.Web/Nop.Web.csproj -c Release -o ./app_publish --no-build

    - name: Smart Prune & Storage Cleanup
      shell: bash
      run: |
        # 1. Prune unused plugins
        creds=$(az webapp deployment list-publishing-credentials --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --query "[publishingUserName, publishingPassword]" -o tsv)
        USER=$(echo "$creds" | sed -n '1p')
        PASS=$(echo "$creds" | sed -n '2p')
        curl -u "$USER:$PASS" -o ./live_plugins.json "https://${{ secrets.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/App_Data/plugins.json" || echo '{"InstalledPluginNames":[]}' > ./live_plugins.json
        INSTALLED=$(jq -r '.InstalledPluginNames[] // empty' ./live_plugins.json)
        FORCE_KEEP=$(echo '${{ env.FORCE_KEEP_PLUGINS }}' | jq -r '.[]')
        for dir in ./app_publish/Plugins/*/; do
            folder=$(basename "$dir")
            [[ $INSTALLED =~ $folder || $FORCE_KEEP =~ $folder ]] || rm -rf "$dir"
        done

        # 2. CLEAR THUMBNAILS (Critical to stay under 1GB D1 limit)
        rm -rf ./app_publish/wwwroot/images/thumbs/*
        rm -rf ./app_publish/App_Data/Logs/*

        # 3. Inject Version Info
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        VERSION_STR="Build #${{ github.run_number }} ($SHORT_SHA) - $(date +'%Y-%m-%d')"
        FOOTER_PATH="./app_publish/Views/Shared/Components/Footer/Default.cshtml"
        if [ -f "$FOOTER_PATH" ]; then
          node -e "const fs=require('fs');const c=fs.readFileSync('$FOOTER_PATH','utf8');fs.writeFileSync('$FOOTER_PATH',c.replace('','$VERSION_STR'));"
        fi

    - name: Zip Artifact
      run: |
        # We delete sensitive local config so Azure uses our injected one
        rm -f ./app_publish/appsettings.json
        cd app_publish && zip -r ../nop-app.zip .

    - name: Upload Zip
      uses: actions/upload-artifact@v4
      with:
        name: nopcommerce-app
        path: nop-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: 
      name: Production
      url: https://${{ secrets.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: nopcommerce-app

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Prepare Infrastructure
      run: |
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku S1
        az webapp deployment slot create --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --configuration-source ${{ secrets.AZURE_WEBAPP_NAME }}

    - name: Deploy to Staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        package: 'nop-app.zip'

    - name: Inject Connection String (Fix 500.30)
      run: |
        creds=$(az webapp deployment list-publishing-credentials --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --query "[publishingUserName, publishingPassword]" -o tsv)
        USER=$(echo "$creds" | sed -n '1p')
        PASS=$(echo "$creds" | sed -n '2p')
        
        # Build appsettings.json with your DB details
        cat > appsettings.json << 'EOF'
        {
          "ConnectionStrings": {
            "DefaultConnection": "Data Source=tcp:${{ secrets.DB_SERVER }}.database.windows.net,1433;Initial Catalog=${{ secrets.DB_NAME }};User ID=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASS }};Persist Security Info=False;MultipleActiveResultSets=False;Connect Timeout=30;Encrypt=True;TrustServerCertificate=False"
          }
        }
        EOF
        
        curl -X PUT -u "$USER:$PASS" --data-binary "@appsettings.json" "https://${{ secrets.AZURE_WEBAPP_NAME }}-staging.scm.azurewebsites.net/api/vfs/site/wwwroot/appsettings.json"

    - name: Warm Up & Smoke Test
      run: |
        sleep 90
        URL="https://${{ secrets.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
        RESPONSE=$(curl -sL --retry 5 --retry-delay 30 "$URL")
        if echo "$RESPONSE" | grep -qi "Cottage"; then
          echo "Smoke test passed!"
        else
          echo "$RESPONSE" | head -c 1000
          exit 1
        fi

    - name: Swap and Cleanup
      if: always()
      run: |
        # Use ; instead of && to ensure execution continues
        if [[ "${{ job.status }}" == "success" ]]; then
          az webapp deployment slot swap --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --target-slot production ;
        fi
        
        echo "Cleaning up..."
        az webapp deployment slot delete --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging || true ;
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku D1 || true