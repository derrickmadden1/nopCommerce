name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  # Plain text variables are allowed here
  FORCE_KEEP_PLUGINS: '["Widgets.MarketLocator", "Shipping.MarketPickup"]'
  SMOKE_TEST_KEYWORD: "Rose Cottage Croft" 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build and Publish
      run: |
        dotnet restore src/NopCommerce.sln
        dotnet build src/NopCommerce.sln -c Release --no-restore
        dotnet publish src/Presentation/Nop.Web/Nop.Web.csproj -c Release -o ./app_publish --no-build

    - name: Smart Prune Plugins & Version Inject
      shell: bash
      run: |
        # 1. Get Kudu Credentials for live site
        creds=$(az webapp deployment list-publishing-credentials --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --query "[publishingUserName, publishingPassword]" -o tsv)
        USER=$(echo "$creds" | sed -n '1p')
        PASS=$(echo "$creds" | sed -n '2p')
        
        # 2. Download Live configuration
        curl -u "$USER:$PASS" -o ./live_plugins.json "https://${{ vars.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/App_Data/plugins.json" || echo '{"InstalledPluginNames":[]}' > ./live_plugins.json
        
        # 3. Prune based on Live + Force Keep
        INSTALLED=$(jq -r '.InstalledPluginNames[] // empty' ./live_plugins.json)
        FORCE_KEEP=$(echo '${{ env.FORCE_KEEP_PLUGINS }}' | jq -r '.[]')
        for dir in ./app_publish/Plugins/*/; do
            folder=$(basename "$dir")
            [[ $INSTALLED =~ $folder || $FORCE_KEEP =~ $folder ]] || rm -rf "$dir"
        done

        # 4. Inject Version Info into Footer (Short SHA fix)
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        VERSION_STR="Build #${{ github.run_number }} ($SHORT_SHA) - $(date +'%Y-%m-%d')"
        FOOTER_PATH="./app_publish/Views/Shared/Components/Footer/Default.cshtml"
        if [ -f "$FOOTER_PATH" ]; then
          sed -i "s//$VERSION_STR/g" "$FOOTER_PATH"
          echo "Injected version: $VERSION_STR"
        fi

    - name: Zip Artifact
      run: |
        rm -f ./app_publish/App_Data/*.json
        rm -rf ./app_publish/App_Data/DataProtectionKeys
        cd app_publish && zip -r ../nop-app.zip .

    - name: Upload Zip
      uses: actions/upload-artifact@v4
      with:
        name: nopcommerce-app
        path: nop-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # SECRETS ARE LEGAL IN THE ENVIRONMENT BLOCK
    environment: 
      name: Production
      url: https://${{ vars.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: nopcommerce-app

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Prepare Infrastructure
      run: |
        echo "Scaling up to S1..."
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku S1
        
        echo "Configuring Run-From-Package..."
        az webapp config appsettings set --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --settings WEBSITE_RUN_FROM_PACKAGE="1"
        
        echo "Creating staging slot..."
        az webapp slot create --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging

    - name: Deploy to Staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        package: 'nop-app.zip'

    - name: Warm Up & Smoke Test
      run: |
        echo "Waiting for staging slot initialization..."
        sleep 45 
        URL="https://${{ vars.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
        curl -sL --retry 3 --retry-delay 20 "$URL" | grep -q "${{ env.SMOKE_TEST_KEYWORD }}" || (echo "Smoke test failed!" && exit 1)

    - name: Prepare Maintenance Mode
      run: |
        cat > app_offline.htm << 'EOF'
        <div style="text-align:center; margin-top:100px; font-family:sans-serif;">
            <h1>Updating Our Store</h1><p>We'll be back in just a few seconds!</p>
        </div>
        EOF
        creds=$(az webapp deployment list-publishing-credentials --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --query "[publishingUserName, publishingPassword]" -o tsv)
        USER=$(echo "$creds" | sed -n '1p')
        PASS=$(echo "$creds" | sed -n '2p')
        curl -X PUT -u "$USER:$PASS" --data-binary "@app_offline.htm" "https://${{ vars.AZURE_WEBAPP_NAME }}-staging.scm.azurewebsites.net/api/vfs/site/wwwroot/app_offline.htm"

    - name: Swap and Cleanup
      if: always()
      run: |
        if [[ "${{ job.status }}" == "success" ]]; then
          echo "Executing Swap..."
          az webapp deployment slot swap --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --target-slot production
          
          # Remove Maintenance Mode from Production
          creds=$(az webapp deployment list-publishing-credentials --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --query "[publishingUserName, publishingPassword]" -o tsv)
          USER=$(echo "$creds" | sed -n '1p')
          PASS=$(echo "$creds" | sed -n '2p')
          curl -X DELETE -u "$USER:$PASS" "https://${{ vars.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/app_offline.htm" || true
        fi
        
        echo "Deleting slot and scaling down..."
        az webapp slot delete --name ${{ vars.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging || true
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku D1

    - name: Notify Failure
      if: failure()
      uses: sendgrid/sendgrid-action@v1
      env:
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      with:
        from: 'deployments@yourdomain.com'
        to: 'your-email@domain.com'
        subject: 'ALERT: Deployment Failed for ${{ vars.AZURE_WEBAPP_NAME }}'
        html: 'Check the GitHub Action logs. The swap was aborted and the site scaled back to D1.'