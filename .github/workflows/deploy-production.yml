name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  FORCE_KEEP_PLUGINS: '["Widgets.MarketLocator", "Shipping.MarketPickup"]' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build and Publish
      run: |
        dotnet restore src/NopCommerce.sln
        dotnet build src/NopCommerce.sln -c Release --no-restore
        dotnet publish src/Presentation/Nop.Web/Nop.Web.csproj -c Release -o ./app_publish --no-build

    - name: Smart Prune Plugins
      shell: bash
      run: |
        creds=$(az webapp deployment list-publishing-credentials --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --query "[publishingUserName, publishingPassword]" -o tsv)
        USER=$(echo "$creds" | sed -n '1p')
        PASS=$(echo "$creds" | sed -n '2p')
        
        curl -u "$USER:$PASS" -o ./live_plugins.json "https://${{ secrets.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/vfs/site/wwwroot/App_Data/plugins.json" || echo '{"InstalledPluginNames":[]}' > ./live_plugins.json
        
        INSTALLED=$(jq -r '.InstalledPluginNames[] // empty' ./live_plugins.json)
        FORCE_KEEP=$(echo '${{ env.FORCE_KEEP_PLUGINS }}' | jq -r '.[]')
        
        for dir in ./app_publish/Plugins/*/; do
            folder=$(basename "$dir")
            [[ $INSTALLED =~ $folder || $FORCE_KEEP =~ $folder ]] || rm -rf "$dir"
        done

    - name: Zip Artifact
      run: |
        rm -f ./app_publish/App_Data/*.json
        rm -rf ./app_publish/App_Data/DataProtectionKeys
        cd app_publish && zip -r ../nop-app.zip .

    - name: Upload Zip
      uses: actions/upload-artifact@v4
      with:
        name: nopcommerce-app
        path: nop-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: nopcommerce-app

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Scale Up & Slot Create
      run: |
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku S1
        az webapp config appsettings set --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --settings WEBSITE_RUN_FROM_PACKAGE="1"
        az webapp slot create --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging

    - name: Deploy to Staging
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        slot-name: 'staging'
        package: 'nop-app.zip'

    - name: Warm Up & Smoke Test
      run: |
        # Wait for the app to initialize
        sleep 30 
        URL="https://${{ secrets.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net"
        # Check for your store name in the HTML
        curl -sL "$URL" | grep -q "YourStoreName" || (echo "Smoke test failed" && exit 1)

    - name: Swap and Cleanup
      if: always()
      run: |
        if [[ "${{ job.status }}" == "success" ]]; then
          az webapp deployment slot swap --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging --target-slot production
        fi
        az webapp slot delete --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group rosecottagecroft --slot staging || true
        az appservice plan update --name Default1 --resource-group Default-Web-NorthEurope --sku D1